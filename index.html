<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carson Cook - Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: 600;
            letter-spacing: -1px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1;
            background: #f0f0f0;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-item-overlay {
            transform: translateY(0);
        }

        .gallery-item-overlay h3 {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .gallery-item-overlay p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-image {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2em;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1em;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .upload-instructions {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            color: white;
        }

        .upload-instructions code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Carson Cook</h1>
    </header>

    <div class="container">
        <div class="gallery" id="gallery">
            <!-- Gallery items will be generated here -->
        </div>

        <div class="empty-state" id="emptyState">
            <h2>No images yet</h2>
            <p>Add images to make this gallery come alive!</p>
            <div class="upload-instructions">
                <p>📁 Create an <code>images</code> folder</p>
                <p style="margin-top: 10px;">📸 Add your photos there</p>
                <p style="margin-top: 10px; opacity: 0.7;">They will appear here automatically</p>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img class="modal-image" id="modalImage" src="" alt="">
        </div>
    </div>

    <script>
        // Gallery initialization
        function initGallery() {
            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');

            // Fetch the images folder contents from GitHub API
            fetch('https://api.github.com/repos/cookc227-ctrl-alt/right-hand-or-left-hand/contents/images')
                .then(response => response.json())
                .then(data => {
                    // Filter for image files
                    const imageFiles = data.filter(file => 
                        /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)
                    );

                    if (imageFiles.length === 0) {
                        gallery.innerHTML = '';
                        emptyState.style.display = 'block';
                        return;
                    }

                    // Hide empty state and populate gallery
                    emptyState.style.display = 'none';
                    gallery.innerHTML = '';

                    imageFiles.forEach(file => {
                        const imageUrl = `https://raw.githubusercontent.com/cookc227-ctrl-alt/right-hand-or-left-hand/main/images/${file.name}`;
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.onclick = () => openModal(imageUrl);
                        item.innerHTML = `
                            <img src="${imageUrl}" alt="${file.name}" onerror="this.style.display='none'">
                            <div class="gallery-item-overlay">
                                <h3>${file.name.split('.')[0]}</h3>
                                <p>Click to view</p>
                            </div>
                        `;
                        gallery.appendChild(item);
                    });
                })
                .catch(error => {
                    console.log('Could not load images:', error);
                    emptyState.style.display = 'block';
                });
        }

        function openModal(src) {
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside image
        document.getElementById('modal').onclick = function(e) {
            if (e.target === this) closeModal();
        };

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize gallery on page load
        initGallery();
    </script>
</body>
</html>
